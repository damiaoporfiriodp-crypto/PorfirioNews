<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#d90429">
    <meta charset="UTF-8">
    <title>
    {% block title %}
    PorfírioNews
    {% endblock %}
    </title>

    {% block meta %}
    {% endblock %}

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>

    <div class="logo">
        PORFÍRIONEWS
    </div>

    <nav>

        <a href="/">HOME</a>
        <a href="/categoria/TAVARES">TAVARES</a>
        <a href="/categoria/REGIÃO">REGIÃO</a>
        <a href="/categoria/POLÍTICA">POLÍTICA</a>
        <a href="/categoria/CULTURA">CULTURA</a>
        <a href="/categoria/OPINIÃO">OPINIÃO</a>

    </nav>
     
    <form action="/buscar" method="GET">

        <input
            type="text"
            name="q"
            placeholder="Buscar notícias...">

        <button type="submit">
            Buscar
        </button>

    </form>

    </header>

<main>

{% block content %}
{% endblock %}

</main>
<footer class="rodape">

    <div class="rodape-conteudo">

        <h3>PorfírioNews</h3>

        <p>
            Portal de notícias de Tavares, região e Paraíba.
        </p>

        <p>
            © 2026 - Todos os direitos reservados.
        </p>

    </div>

</footer>

</body>
</html>
