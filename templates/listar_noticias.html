<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerenciar Notícias</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin: 30px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #ccc;
    padding:10px;
}

th{
    background:#111;
    color:white;
}

</style>

</head>

<body>

<h1>Gerenciar Notícias</h1>

<p>
<a href="/admin/dashboard">
← Voltar ao Painel
</a>
</p>

<table>

<tr>
    <th>ID</th>
    <th>Título</th>
    <th>Categoria</th>
    <th>Autor</th>
    <th>Ações</th>
</tr>

{% for noticia in noticias %}

<tr>

    <td>{{ noticia.id }}</td>

    <td>{{ noticia.titulo }}</td>

    <td>{{ noticia.categoria }}</td>

    <td>{{ noticia.autor }}</td>

    <td>

        <a href="/admin/editar/{{ noticia.id }}">
            ✏️ Editar
        </a>

        |

        <a href="/admin/excluir/{{ noticia.id }}">
            🗑️ Excluir
        </a>

    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
