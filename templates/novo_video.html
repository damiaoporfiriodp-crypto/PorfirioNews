{% extends "base.html" %}

{% block content %}

<h1>Novo Vídeo</h1>

<form method="POST">

    <label>Título</label>
    <input type="text"
           name="titulo"
           required>

    <br><br>

    <label>Descrição</label>
    <textarea
        name="descricao"
        rows="6"></textarea>

    <br><br>

    <label>Link do YouTube</label>
    <input type="text"
           name="youtube_url"
           required>

    <br><br>

    <button type="submit">
        Salvar Vídeo
    </button>

</form>

{% endblock %}
